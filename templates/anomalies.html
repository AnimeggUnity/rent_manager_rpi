<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>異常幀紀錄</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; font-family: 'PingFang TC', 'Heiti TC', sans-serif; padding-bottom: 40px; }
        .page-header { background: #1a237e; color: white; padding: 25px 0; margin-bottom: 25px; }
        .hex-cell { font-family: monospace; font-size: 0.75rem; word-break: break-all; max-width: 320px; color: #555; }
        .fc-read  { background: #e3f2fd; color: #1565c0; }
        .fc-write { background: #fff3e0; color: #e65100; }
        .fc-ctrl  { background: #fce4ec; color: #c62828; }
        .fc-other { background: #f3e5f5; color: #6a1b9a; }
        .fc-badge { border-radius: 4px; padding: 2px 7px; font-size: 0.78rem; font-weight: 700; white-space: nowrap; }
        th { background: #1a237e; color: white; position: sticky; top: 0; z-index: 1; }
        td { vertical-align: middle; font-size: 0.85rem; }
        .table-wrap { max-height: 75vh; overflow-y: auto; }
        .count-badge { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 3px 12px; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="page-header text-center">
    <h4 class="fw-bold mb-1">🔍 RS485 異常幀紀錄</h4>
    <p class="mb-2 opacity-75 small">排除常態輪詢後，剩餘的所有非標準幀</p>
    <a href="/" class="btn btn-outline-light btn-sm me-2">← 返回監控</a>
    <button class="btn btn-light btn-sm" onclick="loadData()">重新整理</button>
    <span class="count-badge ms-3" id="countBadge">載入中...</span>
</div>

<div class="container-fluid px-4">
    <div class="mb-3 d-flex gap-2 align-items-center flex-wrap">
        <span class="text-muted small">篩選 FC：</span>
        <button class="btn btn-sm btn-outline-secondary filter-btn active" data-fc="all">全部</button>
        <button class="btn btn-sm fc-badge fc-read filter-btn" data-fc="3">FC03 Read</button>
        <button class="btn btn-sm fc-badge fc-write filter-btn" data-fc="6">FC06 Write</button>
        <button class="btn btn-sm fc-badge fc-write filter-btn" data-fc="16">FC10 WriteMulti</button>
        <button class="btn btn-sm fc-badge fc-ctrl filter-btn" data-fc="5">FC05 Coil</button>
        <button class="btn btn-sm fc-badge fc-other filter-btn" data-fc="other">其他</button>
        <span class="ms-auto text-muted small">顯示最新 <select id="limitSel" class="form-select form-select-sm d-inline-block w-auto" onchange="loadData()">
            <option value="200">200筆</option>
            <option value="500">500筆</option>
            <option value="1000">1000筆</option>
        </select></span>
    </div>

    <div class="table-wrap">
        <table class="table table-bordered table-sm table-hover mb-0">
            <thead>
                <tr>
                    <th style="width:140px">時間</th>
                    <th style="width:60px">Slave</th>
                    <th style="width:120px">Function Code</th>
                    <th style="width:60px">長度</th>
                    <th style="width:120px">備注</th>
                    <th>Raw Hex</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6" class="text-center text-muted py-4">載入中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let allRows = [];
    let currentFilter = "all";

    const FC_NAMES = {
        3: ["FC03 ReadHoldingRegs", "fc-read"],
        6: ["FC06 WriteSingleReg", "fc-write"],
        16: ["FC10 WriteMultiRegs", "fc-write"],
        5: ["FC05 WriteCoil", "fc-ctrl"],
    };

    function fcBadge(fc) {
        if (fc === null) return '<span class="text-muted">-</span>';
        const info = FC_NAMES[fc] || [`FC${fc.toString(16).toUpperCase().padStart(2,"0")}`, "fc-other"];
        return `<span class="fc-badge ${info[1]}">${info[0]}</span>`;
    }

    function renderTable() {
        const rows = currentFilter === "all" ? allRows :
            currentFilter === "other" ? allRows.filter(r => !FC_NAMES[r.func_code]) :
            allRows.filter(r => r.func_code == currentFilter);

        if (rows.length === 0) {
            document.getElementById("tableBody").innerHTML =
                '<tr><td colspan="6" class="text-center text-muted py-4">無符合資料</td></tr>';
            return;
        }

        document.getElementById("tableBody").innerHTML = rows.map(r => `
            <tr>
                <td class="text-muted small">${r.ts}</td>
                <td class="text-center fw-bold">${r.slave ?? "-"}</td>
                <td>${fcBadge(r.func_code)}</td>
                <td class="text-center">${r.length}B</td>
                <td><small class="text-secondary">${r.note || ""}</small></td>
                <td class="hex-cell">${r.raw_hex}</td>
            </tr>`).join("");
    }

    async function loadData() {
        const limit = document.getElementById("limitSel").value;
        document.getElementById("countBadge").innerText = "載入中...";
        try {
            const res = await fetch("/api/anomalies?limit=" + limit);
            allRows = await res.json();
            document.getElementById("countBadge").innerText = `共 ${allRows.length} 筆`;
            renderTable();
        } catch(e) {
            document.getElementById("tableBody").innerHTML =
                '<tr><td colspan="6" class="text-center text-danger py-4">載入失敗</td></tr>';
        }
    }

    document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", function() {
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            this.classList.add("active");
            currentFilter = this.dataset.fc;
            renderTable();
        });
    });

    loadData();
    setInterval(loadData, 30000); // 每 30 秒自動更新
</script>
</body>
</html>
